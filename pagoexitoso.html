<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Pago exitoso! - Patofelting</title>
  <link rel="stylesheet" href="Untitled-1.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    .pago-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 60% 30%, #B4F1D9 0%, #ECFFF2 100%);
      padding: 40px 20px;
    }
    .pago-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(67,193,96,0.13);
      padding: 48px 40px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .pago-icono {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #43c160, #28705b);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 6px 24px rgba(67,193,96,0.25);
      animation: pop .5s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .pago-icono i { font-size: 2.8rem; color: #fff; }
    .pago-card h1 {
      font-size: 1.9rem;
      color: #246655;
      margin-bottom: 12px;
      font-weight: 800;
    }
    .pago-card p {
      color: #555;
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .pago-card .destacado {
      background: rgba(67,193,96,0.09);
      border-left: 4px solid #43c160;
      border-radius: 0 8px 8px 0;
      padding: 12px 16px;
      margin: 20px 0;
      color: #246655;
      font-weight: 600;
      text-align: left;
    }
    .pago-card .btn-volver {
      display: inline-block;
      margin-top: 24px;
      background: linear-gradient(135deg, #43c160, #28705b);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 32px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform .2s ease, box-shadow .2s ease;
      box-shadow: 0 4px 14px rgba(67,193,96,0.25);
    }
    .pago-card .btn-volver:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(67,193,96,0.35);
    }
    .logo-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo-top img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
    }
    .logo-top span {
      font-weight: 800;
      font-size: 1.3rem;
      color: #43c160;
    }
    @media (max-width: 520px) {
      .pago-card { padding: 36px 22px 30px; }
      .pago-card h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="pago-page">
    <div class="pago-card">
      <div class="logo-top">
        <img src="img/patofelting.jpg" alt="Logo Patofelting" />
        <span>Patofelting</span>
      </div>

      <div class="pago-icono">
        <i class="fas fa-check"></i>
      </div>

      <h1>¡Pago aprobado! 🎉</h1>
      <p>Tu pedido fue recibido con éxito. Muchas gracias por tu compra.</p>

      <div class="destacado">
        <i class="fas fa-whatsapp" style="color:#25D366;margin-right:6px;"></i>
        Nos vamos a comunicar contigo pronto para coordinar la entrega.
      </div>

      <p>Revisá tu historial de Mercado Pago si necesitás el comprobante de pago.</p>

      <a href="index.html" class="btn-volver">
        <i class="fas fa-home" style="margin-right:8px;"></i>Volver al inicio
      </a>
    </div>
  </div>
</body>
</html>
